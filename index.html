<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocVault — Khám phá tài liệu</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="client.css">
</head>
<body>

  <!-- ═══ HERO NAV ═══ -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a class="header-logo" href="#">
        <div class="hl-icon">⚡</div>
        <span class="hl-name">Doc<strong>Vault</strong></span>
      </a>
      <nav class="header-nav">
        <a href="#" onclick="filterAll()">Tất cả</a>
        <a href="#tag-bar">Theo tag</a>
        <a href="admin.html" target="_blank" class="admin-link">Admin ↗</a>
      </nav>
      <button class="hamburger-client" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <!-- Mobile nav -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#" onclick="filterAll();closeMobileMenu()">Tất cả</a>
    <a href="admin.html" target="_blank">Admin ↗</a>
    <button class="mm-close" onclick="closeMobileMenu()">✕</button>
  </div>

  <!-- ═══ HERO SECTION ═══ -->
  <section class="hero">
    <div class="hero-bg">
      <div class="hero-orb orb1"></div>
      <div class="hero-orb orb2"></div>
      <div class="hero-orb orb3"></div>
    </div>
    <div class="hero-content">
      <div class="hero-badge">✦ Kho tài liệu mở</div>
      <h1 class="hero-title">Khám phá & học hỏi<br><span class="gradient-text">từ kho tài liệu</span></h1>
      <p class="hero-desc">Tài liệu, hướng dẫn, snippet code và demo trực tiếp — tất cả trong một nơi.</p>
      <div class="hero-search">
        <span class="hs-icon">⌕</span>
        <input type="text" id="heroSearch" placeholder="Tìm kiếm tài liệu, tag, loại..." autocomplete="off">
        <kbd>↵</kbd>
      </div>
      <div class="hero-stats" id="heroStats">
        <span id="hs-total">— tài liệu</span>
        <span class="hs-dot">·</span>
        <span id="hs-tags">— tags</span>
        <span class="hs-dot">·</span>
        <span id="hs-demo">— có demo</span>
      </div>
    </div>
  </section>

  <!-- ═══ MAIN CONTENT ═══ -->
  <div class="site-body" id="siteBody">

    <!-- Tag bar -->
    <div class="tag-bar" id="tag-bar">
      <div class="tag-bar-inner" id="tagBarInner">
        <button class="tag-btn active" onclick="setClientFilter('all',this)">✦ Tất cả</button>
      </div>
    </div>

    <!-- Docs grid -->
    <div class="content-wrap">
      <div class="results-info" id="resultsInfo"></div>
      <div class="client-grid" id="clientGrid">
        <div class="client-loading">
          <div class="loader"></div>
          <p>Đang tải tài liệu…</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ═══ DOC DETAIL OVERLAY ═══ -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel" id="detailPanel">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-scroll" id="detailScroll">
        <div class="detail-loading">
          <div class="loader"></div><p>Đang tải…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <span class="fl-icon">⚡</span>
        <span>DocVault</span>
      </div>
      <p class="footer-text">Kho tài liệu được xây dựng với ❤️</p>
    </div>
  </footer>

  <script type="module" src="client.js"></script>
</body>
</html>
